<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources & FAQ | NJ National Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white" data-page="resources">
    <div id="navbar-container"></div>
    
    <main class="pt-24">
        <section class="max-w-4xl mx-auto px-6 py-20">
            <h1 class="text-5xl font-black uppercase text-center mb-20">Resources</h1>
            
            <div class="space-y-16">
                <!-- Benefits Calculator -->
                <section id="benefits-calc">
                    <h2 class="text-3xl font-black uppercase mb-12">Benefits Calculator</h2>

                <section id="faq">
                    <h2 class="text-3xl font-black uppercase mb-12">FAQ</h2>

                            <summary class="font-bold uppercase cursor-pointer pb-4">Can I join with tattoos?</summary>
